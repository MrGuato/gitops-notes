<svg width="100%" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, sans-serif;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#4b5563" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
    .header-title { font-size: 18px; font-weight: 500; fill: #f3f4f6; }
    .header-sub   { font-size: 12px; fill: #6b7280; }
    .label-md     { font-size: 13px; font-weight: 500; }
    .label-sm     { font-size: 11px; fill: #6b7280; }
    .label-mono   { font-family: 'Menlo', 'Consolas', monospace; font-size: 11px; fill: #9ca3af; }
    .section-ttl  { font-size: 13px; font-weight: 500; fill: #d1d5db; }
    .step-sub     { font-size: 11px; fill: #9ca3af; }
    .divider      { stroke: #374151; stroke-width: 0.5; }
    .border       { fill: none; stroke: #374151; stroke-width: 0.8; }
  </style>
</defs>

<!-- Dark background -->
<rect x="0" y="0" width="680" height="380" rx="0" fill="#0f1117"/>
<rect x="20" y="20" width="640" height="340" rx="16" class="border"/>

<!-- Header -->
<text class="header-title" x="340" y="56" text-anchor="middle">GitOps TLS secret delivery pipeline</text>
<text class="header-sub" x="340" y="76" text-anchor="middle">Grafana on k3s — FluxCD + SOPS + age encryption</text>

<!-- Box 1: openssl — teal -->
<rect x="42" y="108" width="104" height="72" rx="8" fill="#0d2b22" stroke="#0f6e56" stroke-width="0.8"/>
<text class="label-md" x="94" y="138" text-anchor="middle" dominant-baseline="central" fill="#5dcaa5">openssl</text>
<text class="step-sub" x="94" y="158" text-anchor="middle" dominant-baseline="central">self-signed cert</text>
<text class="label-sm" x="94" y="196" text-anchor="middle">1. generate</text>

<line x1="147" y1="144" x2="165" y2="144" stroke="#374151" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<!-- Box 2: kubectl — blue -->
<rect x="166" y="108" width="104" height="72" rx="8" fill="#0c1f35" stroke="#185fa5" stroke-width="0.8"/>
<text class="label-md" x="218" y="138" text-anchor="middle" dominant-baseline="central" fill="#85b7eb">kubectl</text>
<text class="step-sub" x="218" y="158" text-anchor="middle" dominant-baseline="central">dry-run → yaml</text>
<text class="label-sm" x="218" y="196" text-anchor="middle">2. render secret</text>

<line x1="271" y1="144" x2="289" y2="144" stroke="#374151" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<!-- Box 3: SOPS — purple -->
<rect x="290" y="108" width="104" height="72" rx="8" fill="#1a1535" stroke="#534ab7" stroke-width="0.8"/>
<text class="label-md" x="342" y="138" text-anchor="middle" dominant-baseline="central" fill="#afa9ec">sops + age</text>
<text class="step-sub" x="342" y="158" text-anchor="middle" dominant-baseline="central">AES256-GCM</text>
<text class="label-sm" x="342" y="196" text-anchor="middle">3. encrypt</text>

<line x1="395" y1="144" x2="413" y2="144" stroke="#374151" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<!-- Box 4: git push — gray -->
<rect x="414" y="108" width="104" height="72" rx="8" fill="#1a1a18" stroke="#444441" stroke-width="0.8"/>
<text class="label-md" x="466" y="138" text-anchor="middle" dominant-baseline="central" fill="#b4b2a9">git push</text>
<text class="step-sub" x="466" y="158" text-anchor="middle" dominant-baseline="central">MrGuato/pi-cluster</text>
<text class="label-sm" x="466" y="196" text-anchor="middle">4. commit</text>

<line x1="519" y1="144" x2="537" y2="144" stroke="#374151" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<!-- Box 5: FluxCD — amber -->
<rect x="538" y="108" width="104" height="72" rx="8" fill="#271a06" stroke="#854f0b" stroke-width="0.8"/>
<text class="label-md" x="590" y="138" text-anchor="middle" dominant-baseline="central" fill="#ef9f27">FluxCD</text>
<text class="step-sub" x="590" y="158" text-anchor="middle" dominant-baseline="central">reconcile + decrypt</text>
<text class="label-sm" x="590" y="196" text-anchor="middle">5. apply</text>

<!-- Divider -->
<line x1="40" y1="216" x2="640" y2="216" class="divider"/>

<!-- Section heading -->
<text class="section-ttl" x="340" y="244" text-anchor="middle">What SOPS encrypts (and what it leaves readable)</text>

<!-- Left: encrypted — purple -->
<rect x="42" y="258" width="280" height="100" rx="8" fill="#1a1535" stroke="#534ab7" stroke-width="0.8"/>
<text class="label-md" x="182" y="280" text-anchor="middle" fill="#afa9ec">data: (encrypted)</text>
<text class="label-mono" x="182" y="300" text-anchor="middle">tls.crt: ENC[AES256_GCM,…]</text>
<text class="label-mono" x="182" y="318" text-anchor="middle">tls.key: ENC[AES256_GCM,…]</text>
<text class="step-sub" x="182" y="342" text-anchor="middle">--encrypted-regex '^(data|stringData)$'</text>

<!-- Right: readable — teal -->
<rect x="358" y="258" width="284" height="100" rx="8" fill="#0d2b22" stroke="#0f6e56" stroke-width="0.8"/>
<text class="label-md" x="500" y="280" text-anchor="middle" fill="#5dcaa5">metadata: (readable)</text>
<text class="label-mono" x="500" y="300" text-anchor="middle">name: grafana-tls-secret</text>
<text class="label-mono" x="500" y="318" text-anchor="middle">namespace: monitoring</text>
<text class="step-sub" x="500" y="342" text-anchor="middle">safe for Git — diffs stay reviewable</text>
</svg>
