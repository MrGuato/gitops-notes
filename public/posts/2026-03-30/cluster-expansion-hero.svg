<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="bigGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="lineGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lineGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </linearGradient>
    <linearGradient id="connGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f1117"/>
  
  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#6366f1" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Ambient glow behind nodes -->
  <circle cx="600" cy="260" r="120" fill="#6366f1" opacity="0.04" filter="url(#bigGlow)"/>
  <circle cx="340" cy="400" r="80" fill="#22d3ee" opacity="0.04" filter="url(#bigGlow)"/>
  <circle cx="860" cy="400" r="80" fill="#22d3ee" opacity="0.04" filter="url(#bigGlow)"/>

  <!-- Connection lines from server to workers -->
  <line x1="600" y1="290" x2="370" y2="370" stroke="url(#connGrad)" stroke-width="2" opacity="0.5" filter="url(#glow)" stroke-dasharray="6,4"/>
  <line x1="600" y1="290" x2="830" y2="370" stroke="url(#connGrad)" stroke-width="2" opacity="0.5" filter="url(#glow)" stroke-dasharray="6,4"/>
  
  <!-- Horizontal connection between workers -->
  <line x1="410" y1="400" x2="790" y2="400" stroke="url(#lineGrad2)" stroke-width="1" opacity="0.3" stroke-dasharray="4,6"/>

  <!-- Server node (kubepi) -->
  <g filter="url(#softGlow)">
    <rect x="520" y="210" width="160" height="100" rx="12" fill="url(#nodeGrad)" stroke="#6366f1" stroke-width="1.5" opacity="0.95"/>
    <rect x="520" y="210" width="160" height="100" rx="12" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Server icon (simplified k8s wheel) -->
  <circle cx="600" cy="245" r="14" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.9"/>
  <circle cx="600" cy="245" r="5" fill="#6366f1" opacity="0.7"/>
  <line x1="600" y1="229" x2="600" y2="233" stroke="#6366f1" stroke-width="1.5" opacity="0.7"/>
  <line x1="600" y1="257" x2="600" y2="261" stroke="#6366f1" stroke-width="1.5" opacity="0.7"/>
  <line x1="584" y1="237" x2="587" y2="239" stroke="#6366f1" stroke-width="1.5" opacity="0.7"/>
  <line x1="613" y1="251" x2="616" y2="253" stroke="#6366f1" stroke-width="1.5" opacity="0.7"/>
  <line x1="584" y1="253" x2="587" y2="251" stroke="#6366f1" stroke-width="1.5" opacity="0.7"/>
  <line x1="613" y1="239" x2="616" y2="237" stroke="#6366f1" stroke-width="1.5" opacity="0.7"/>
  <text x="600" y="281" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="13" font-weight="600">kubepi</text>
  <text x="600" y="298" text-anchor="middle" fill="#6366f1" font-family="monospace" font-size="10" opacity="0.8">server / 8GB</text>

  <!-- Worker 1 node (kubepi-w1) -->
  <g filter="url(#softGlow)">
    <rect x="270" y="355" width="160" height="90" rx="12" fill="url(#nodeGrad)" stroke="#22d3ee" stroke-width="1.5" opacity="0.95"/>
  </g>
  <circle cx="350" cy="385" r="10" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.8"/>
  <circle cx="350" cy="385" r="3.5" fill="#22d3ee" opacity="0.6"/>
  <text x="350" y="415" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="13" font-weight="600">kubepi-w1</text>
  <text x="350" y="432" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="10" opacity="0.8">agent / 4GB</text>

  <!-- Worker 2 node (kubepi-w2) -->
  <g filter="url(#softGlow)">
    <rect x="770" y="355" width="160" height="90" rx="12" fill="url(#nodeGrad)" stroke="#22d3ee" stroke-width="1.5" opacity="0.95"/>
  </g>
  <circle cx="850" cy="385" r="10" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.8"/>
  <circle cx="850" cy="385" r="3.5" fill="#22d3ee" opacity="0.6"/>
  <text x="850" y="415" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="13" font-weight="600">kubepi-w2</text>
  <text x="850" y="432" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="10" opacity="0.8">agent / 2GB</text>

  <!-- Small pod indicators on workers -->
  <!-- w1 pods -->
  <rect x="290" y="370" width="8" height="8" rx="2" fill="#a78bfa" opacity="0.6"/>
  <rect x="302" y="370" width="8" height="8" rx="2" fill="#a78bfa" opacity="0.6"/>
  <rect x="314" y="370" width="8" height="8" rx="2" fill="#a78bfa" opacity="0.6"/>
  <!-- w2 pods -->
  <rect x="790" y="370" width="8" height="8" rx="2" fill="#a78bfa" opacity="0.6"/>
  <rect x="802" y="370" width="8" height="8" rx="2" fill="#a78bfa" opacity="0.6"/>
  <rect x="814" y="370" width="8" height="8" rx="2" fill="#a78bfa" opacity="0.6"/>

  <!-- Title -->
  <text x="600" y="90" text-anchor="middle" fill="#f1f5f9" font-family="monospace" font-size="32" font-weight="700" letter-spacing="1">From One Node to Three</text>
  <text x="600" y="125" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="16">k3s cluster expansion on Raspberry Pi</text>
  
  <!-- Bottom labels -->
  <text x="600" y="520" text-anchor="middle" fill="#475569" font-family="monospace" font-size="12">podAntiAffinity  //  cgroups  //  local-path PVC  //  GitOps-first</text>
  
  <!-- Decorative corner elements -->
  <line x1="40" y1="560" x2="40" y2="590" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
  <line x1="40" y1="590" x2="70" y2="590" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
  <line x1="1160" y1="40" x2="1160" y2="70" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
  <line x1="1130" y1="40" x2="1160" y2="40" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
</svg>
