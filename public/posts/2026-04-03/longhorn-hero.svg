<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="100%" stop-color="#0d1017"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="replicaGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg3)"/>

  <!-- Grid -->
  <g opacity="0.04">
    <line x1="60" y1="0" x2="60" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="60" x2="1200" y2="60" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Accent bar -->
  <rect x="0" y="0" width="4" height="630" fill="url(#accent3)"/>

  <!-- Storage topology diagram -->
  <g transform="translate(660, 100)">
    <!-- PVC request -->
    <rect x="100" y="0" width="120" height="40" rx="6" fill="#0d1117" stroke="#a855f7" stroke-width="1.5"/>
    <text x="160" y="24" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#a855f7">PVC Request</text>

    <!-- Arrow down -->
    <line x1="160" y1="40" x2="160" y2="70" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,4"/>
    <polygon points="155,68 160,78 165,68" fill="#3b82f6"/>

    <!-- Longhorn engine -->
    <rect x="60" y="80" width="200" height="50" rx="8" fill="#0d1117" stroke="#3b82f6" stroke-width="2"/>
    <rect x="60" y="80" width="200" height="3" rx="2" fill="#3b82f6" opacity="0.6"/>
    <text x="160" y="108" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#3b82f6">Longhorn</text>
    <text x="160" y="122" text-anchor="middle" font-family="monospace" font-size="10" fill="#5a5f7a">CSI Driver</text>

    <!-- Replica arrows -->
    <line x1="110" y1="130" x2="50" y2="175" stroke="#10b981" stroke-width="1.5"/>
    <polygon points="46,170 50,180 56,172" fill="#10b981"/>

    <line x1="210" y1="130" x2="280" y2="175" stroke="#10b981" stroke-width="1.5"/>
    <polygon points="274,172 280,180 284,170" fill="#10b981"/>

    <!-- Replica 1: kubethink -->
    <rect x="-40" y="180" width="180" height="90" rx="6" fill="#0d1117" stroke="#f97316" stroke-width="1.5"/>
    <rect x="-40" y="180" width="180" height="2" fill="#f97316" opacity="0.4"/>
    <text x="50" y="206" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#e4e6f0">kubethink</text>
    <text x="50" y="224" text-anchor="middle" font-family="monospace" font-size="10" fill="#f97316">Replica 1</text>

    <!-- T7 Shield indicator -->
    <rect x="-20" y="236" width="140" height="24" rx="4" fill="#0d1117" stroke="#3b82f6" stroke-width="1" opacity="0.7"/>
    <text x="50" y="252" text-anchor="middle" font-family="monospace" font-size="9" fill="#3b82f6">T7 Shield · 1.8TB</text>
    <circle cx="-28" cy="194" r="4" fill="#10b981" filter="url(#glow3)"/>

    <!-- Replica 2: kubepi-w1 -->
    <rect x="180" y="180" width="180" height="90" rx="6" fill="#0d1117" stroke="#c51a4a" stroke-width="1.5"/>
    <rect x="180" y="180" width="180" height="2" fill="#c51a4a" opacity="0.4"/>
    <text x="270" y="206" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#e4e6f0">kubepi-w1</text>
    <text x="270" y="224" text-anchor="middle" font-family="monospace" font-size="10" fill="#c51a4a">Replica 2</text>

    <!-- SD card indicator -->
    <rect x="200" y="236" width="140" height="24" rx="4" fill="#0d1117" stroke="#3b82f6" stroke-width="1" opacity="0.7"/>
    <text x="270" y="252" text-anchor="middle" font-family="monospace" font-size="9" fill="#3b82f6">SD Card</text>
    <circle cx="192" cy="194" r="4" fill="#10b981" filter="url(#glow3)"/>

    <!-- Replication label -->
    <text x="160" y="310" text-anchor="middle" font-family="monospace" font-size="10" fill="#10b981" opacity="0.7">2x replicas across nodes</text>

    <!-- CNCF badge -->
    <rect x="100" y="340" width="120" height="24" rx="4" fill="#0d1117" stroke="#5a5f7a" stroke-width="1"/>
    <text x="160" y="356" text-anchor="middle" font-family="monospace" font-size="9" fill="#5a5f7a">CNCF Incubating</text>
  </g>

  <!-- Tech badges -->
  <g transform="translate(60, 480)">
    <rect x="0" y="0" width="84" height="28" rx="4" fill="#0d1117" stroke="#3b82f6" stroke-width="1"/>
    <text x="42" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#3b82f6">Longhorn</text>

    <rect x="96" y="0" width="72" height="28" rx="4" fill="#0d1117" stroke="#10b981" stroke-width="1"/>
    <text x="132" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#10b981">FluxCD</text>

    <rect x="180" y="0" width="56" height="28" rx="4" fill="#0d1117" stroke="#475569" stroke-width="1"/>
    <text x="208" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">Helm</text>

    <rect x="248" y="0" width="56" height="28" rx="4" fill="#0d1117" stroke="#475569" stroke-width="1"/>
    <text x="276" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">iSCSI</text>

    <rect x="316" y="0" width="56" height="28" rx="4" fill="#0d1117" stroke="#475569" stroke-width="1"/>
    <text x="344" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">CSI</text>
  </g>

  <!-- Title -->
  <text x="60" y="100" font-family="'JetBrains Mono', monospace" font-size="42" font-weight="800" fill="#e4e6f0">Longhorn</text>
  <text x="60" y="150" font-family="'JetBrains Mono', monospace" font-size="42" font-weight="800" fill="#3b82f6">Storage</text>
  <text x="60" y="200" font-family="'JetBrains Mono', monospace" font-size="18" fill="#5a5f7a">distributed block storage on k3s</text>
  <text x="60" y="230" font-family="'JetBrains Mono', monospace" font-size="18" fill="#5a5f7a">with a 2TB SSD via GitOps</text>

  <!-- Date -->
  <text x="60" y="560" font-family="monospace" font-size="12" fill="#3d4260">April 3, 2026</text>
  <rect x="60" y="580" width="200" height="1" fill="#1e2235"/>
</svg>
