<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="100%" stop-color="#0d1017"/>
    </linearGradient>
    <linearGradient id="accent4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="33%" stop-color="#3b82f6"/>
      <stop offset="66%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg4)"/>

  <!-- Grid -->
  <g opacity="0.03">
    <line x1="60" y1="0" x2="60" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="180" y1="0" x2="180" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="60" x2="1200" y2="60" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="180" x2="1200" y2="180" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Gradient accent bar -->
  <rect x="0" y="0" width="4" height="630" fill="url(#accent4)"/>

  <!-- Cluster constellation -->
  <g transform="translate(780, 180)">
    <!-- Central hub -->
    <circle cx="120" cy="120" r="60" fill="none" stroke="#1e2235" stroke-width="1" stroke-dasharray="4,8"/>
    <circle cx="120" cy="120" r="120" fill="none" stroke="#1e2235" stroke-width="0.5" stroke-dasharray="4,12"/>

    <!-- kubepi - control plane - top -->
    <circle cx="120" cy="30" r="32" fill="#0d1117" stroke="#10b981" stroke-width="2"/>
    <text x="120" y="28" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#e4e6f0">kubepi</text>
    <text x="120" y="40" text-anchor="middle" font-family="monospace" font-size="7" fill="#10b981">8GB</text>
    <circle cx="120" cy="6" r="3" fill="#10b981" filter="url(#glow4)"/>

    <!-- kubepi-w1 - right -->
    <circle cx="230" cy="120" r="28" fill="#0d1117" stroke="#c51a4a" stroke-width="1.5"/>
    <text x="230" y="118" text-anchor="middle" font-family="monospace" font-size="8" font-weight="700" fill="#e4e6f0">w1</text>
    <text x="230" y="130" text-anchor="middle" font-family="monospace" font-size="7" fill="#c51a4a">4GB</text>
    <circle cx="230" cy="98" r="3" fill="#10b981"/>

    <!-- kubepi-w2 - bottom -->
    <circle cx="120" cy="220" r="24" fill="#0d1117" stroke="#c51a4a" stroke-width="1"/>
    <text x="120" y="218" text-anchor="middle" font-family="monospace" font-size="8" font-weight="700" fill="#e4e6f0">w2</text>
    <text x="120" y="230" text-anchor="middle" font-family="monospace" font-size="7" fill="#c51a4a">2GB</text>
    <circle cx="120" cy="200" r="3" fill="#10b981"/>

    <!-- kubethink - left, larger -->
    <circle cx="10" cy="120" r="36" fill="#0d1117" stroke="#f97316" stroke-width="2"/>
    <text x="10" y="114" text-anchor="middle" font-family="monospace" font-size="8" font-weight="700" fill="#f97316">kube</text>
    <text x="10" y="126" text-anchor="middle" font-family="monospace" font-size="8" font-weight="700" fill="#f97316">think</text>
    <text x="10" y="140" text-anchor="middle" font-family="monospace" font-size="7" fill="#5a5f7a">RHEL</text>
    <circle cx="10" cy="90" r="3" fill="#10b981" filter="url(#glow4)"/>

    <!-- Connection lines -->
    <line x1="120" y1="62" x2="120" y2="120" stroke="#1e2235" stroke-width="1"/>
    <line x1="120" y1="120" x2="200" y2="120" stroke="#1e2235" stroke-width="1"/>
    <line x1="120" y1="120" x2="120" y2="196" stroke="#1e2235" stroke-width="1"/>
    <line x1="120" y1="120" x2="46" y2="120" stroke="#1e2235" stroke-width="1"/>

    <!-- Storage indicator on kubethink -->
    <rect x="-40" y="166" width="100" height="20" rx="3" fill="#0d1117" stroke="#3b82f6" stroke-width="1" opacity="0.7"/>
    <text x="10" y="180" text-anchor="middle" font-family="monospace" font-size="8" fill="#3b82f6">2TB T7 Shield</text>
  </g>

  <!-- Stack pills column -->
  <g transform="translate(60, 310)">
    <rect x="0" y="0" width="90" height="26" rx="4" fill="#0d1117" stroke="#326ce5" stroke-width="1"/>
    <text x="45" y="17" text-anchor="middle" font-family="monospace" font-size="10" fill="#326ce5">k3s</text>

    <rect x="100" y="0" width="90" height="26" rx="4" fill="#0d1117" stroke="#10b981" stroke-width="1"/>
    <text x="145" y="17" text-anchor="middle" font-family="monospace" font-size="10" fill="#10b981">FluxCD</text>

    <rect x="200" y="0" width="100" height="26" rx="4" fill="#0d1117" stroke="#a855f7" stroke-width="1"/>
    <text x="250" y="17" text-anchor="middle" font-family="monospace" font-size="10" fill="#a855f7">SOPS + age</text>

    <rect x="310" y="0" width="90" height="26" rx="4" fill="#0d1117" stroke="#3b82f6" stroke-width="1"/>
    <text x="355" y="17" text-anchor="middle" font-family="monospace" font-size="10" fill="#3b82f6">Longhorn</text>

    <rect x="0" y="36" width="120" height="26" rx="4" fill="#0d1117" stroke="#f97316" stroke-width="1"/>
    <text x="60" y="53" text-anchor="middle" font-family="monospace" font-size="10" fill="#f97316">Cloudflare</text>

    <rect x="130" y="36" width="110" height="26" rx="4" fill="#0d1117" stroke="#eab308" stroke-width="1"/>
    <text x="185" y="53" text-anchor="middle" font-family="monospace" font-size="10" fill="#eab308">Prometheus</text>

    <rect x="250" y="36" width="80" height="26" rx="4" fill="#0d1117" stroke="#06b6d4" stroke-width="1"/>
    <text x="290" y="53" text-anchor="middle" font-family="monospace" font-size="10" fill="#06b6d4">Grafana</text>

    <rect x="340" y="36" width="70" height="26" rx="4" fill="#0d1117" stroke="#6366f1" stroke-width="1"/>
    <text x="375" y="53" text-anchor="middle" font-family="monospace" font-size="10" fill="#6366f1">Velero</text>
  </g>

  <!-- Quote -->
  <text x="60" y="440" font-family="'JetBrains Mono', monospace" font-size="13" font-style="italic" fill="#3d4260">If it is not in Git, it does not exist.</text>

  <!-- Title -->
  <text x="60" y="95" font-family="'JetBrains Mono', monospace" font-size="48" font-weight="800" fill="url(#titleGrad)">Homelab v1</text>
  <text x="60" y="150" font-family="'JetBrains Mono', monospace" font-size="20" fill="#5a5f7a">from a single Pi to a production-pattern</text>
  <text x="60" y="180" font-family="'JetBrains Mono', monospace" font-size="20" fill="#5a5f7a">mixed-architecture Kubernetes cluster</text>

  <!-- Stats row -->
  <g transform="translate(60, 220)">
    <text x="0" y="0" font-family="monospace" font-size="28" font-weight="800" fill="#10b981">4</text>
    <text x="26" y="0" font-family="monospace" font-size="11" fill="#5a5f7a">nodes</text>

    <text x="90" y="0" font-family="monospace" font-size="28" font-weight="800" fill="#3b82f6">2</text>
    <text x="116" y="0" font-family="monospace" font-size="11" fill="#5a5f7a">architectures</text>

    <text x="230" y="0" font-family="monospace" font-size="28" font-weight="800" fill="#a855f7">2</text>
    <text x="256" y="0" font-family="monospace" font-size="11" fill="#5a5f7a">operating systems</text>

    <text x="400" y="0" font-family="monospace" font-size="28" font-weight="800" fill="#f97316">2TB</text>
    <text x="460" y="0" font-family="monospace" font-size="11" fill="#5a5f7a">distributed storage</text>
  </g>

  <!-- Date -->
  <text x="60" y="560" font-family="monospace" font-size="12" fill="#3d4260">April 3, 2026</text>
  <rect x="60" y="580" width="200" height="1" fill="#1e2235"/>
</svg>
